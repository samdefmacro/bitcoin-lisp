name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install SBCL
      run: |
        sudo apt-get update
        sudo apt-get install -y sbcl

    - name: Install libsecp256k1
      run: |
        sudo apt-get install -y libsecp256k1-dev

    - name: Install Quicklisp
      run: |
        curl -O https://beta.quicklisp.org/quicklisp.lisp
        sbcl --non-interactive \
             --load quicklisp.lisp \
             --eval '(quicklisp-quickstart:install)' \
             --eval '(ql:add-to-init-file)'

    - name: Link project to Quicklisp
      run: |
        ln -s ${{ github.workspace }} ~/quicklisp/local-projects/bitcoin-lisp

    - name: Load system and run tests
      run: |
        sbcl --non-interactive \
             --load ~/quicklisp/setup.lisp \
             --eval '(ql:quickload "bitcoin-lisp")' \
             --eval '(ql:quickload "bitcoin-lisp/tests")' \
             --eval '(let ((results (fiveam:run :bitcoin-lisp-tests))) (unless (fiveam:results-status results) (sb-ext:exit :code 1)))'

  typecheck:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install SBCL
      run: |
        sudo apt-get update
        sudo apt-get install -y sbcl

    - name: Install libsecp256k1
      run: |
        sudo apt-get install -y libsecp256k1-dev

    - name: Install Quicklisp
      run: |
        curl -O https://beta.quicklisp.org/quicklisp.lisp
        sbcl --non-interactive \
             --load quicklisp.lisp \
             --eval '(quicklisp-quickstart:install)' \
             --eval '(ql:add-to-init-file)'

    - name: Link project to Quicklisp
      run: |
        ln -s ${{ github.workspace }} ~/quicklisp/local-projects/bitcoin-lisp

    - name: Verify Coalton compilation
      run: |
        sbcl --non-interactive \
             --load ~/quicklisp/setup.lisp \
             --eval '(ql:quickload "bitcoin-lisp")' \
             --eval '(format t "~%Coalton types loaded successfully~%")' \
             --eval '(format t "Hash256, Hash160, Satoshi, BlockHeight types available~%")'
